<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Please choose one</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        .card a:hover {
            color: #ff3f6c;
        }
    </style>
</head>

<body>

    <h1>My Product Collection</h1>

    <div class="grid" id="productGrid"></div>

    <script>
        const products = [
            {
                link: "https://www.myntra.com/tops/navyaazri/navyaazri-abstract-mandarin-collar-ethnic-top/40906817/buy",
                title: "NAVYAAZRI --- Abstract Mandarin Collar Ethnic Top",
                image: "https://assets.myntassets.com/h_1440,q_90,w_1080/v1/assets/images/2026/APRIL/20/u4Axsdbq_b94e14eaf0974863ac09403e9af8be8b.jpg"
            },
            {
                link: "https://amzn.in/d/0cQtBUAr",
                title: "Women's Relaxed Fit Solid Cotton Blend Shirts",
                image: "https://m.media-amazon.com/images/I/713C+BZBhBL._SX679_.jpg"
            },
            {
                link: "https://amzn.in/d/03KLXVTp",
                title: "FYLTR Women's Solid Regular Fit Textured T-Shirt | Cap Sleeves | Comfortable | Casual Tops for Women | Westernwear",
                image: "https://m.media-amazon.com/images/I/61nkQUjxlRL._SY879_.jpg"
            },
            {
                link: "https://amzn.in/d/05YcsSm7",
                title: "Symbol Premium Women's Polyester Crop Top (Relaxed Fit | Stylish | Desk-to-Dinner) (Available in Plus Sizes)",
                image: "https://m.media-amazon.com/images/I/61ykHV748tL._SY879_.jpg"
            },
            {
                link: "https://amzn.in/d/0iwIkzSm",
                title: "Women's Relaxed Fit Solid Cotton Blend Shirts",
                image: "https://m.media-amazon.com/images/I/41afkE3PraL._SY445_SX342_QL70_FMwebp_.jpg"
            },
            {
                link: "https://amzn.in/d/097qaflN",
                title: "GRECIILOOKS Shirt for Women Stylish | Long Shirt for Women | Oversized Shirt for Women | Women Shirt | Woman TOP",
                image: "https://m.media-amazon.com/images/I/71f3SP2zNKL._SY879_.jpg"
            },
            {
                link: "https://www.flipkart.com/iqraar-women-self-design-casual-purple-shirt/p/itm04e22cd4558c7",
                title: "IQRAAR Women Regular Fit Self Design Mandarin Collar Casual Shirt",
                image: "https://rukminim2.flixcart.com/image/1280/1280/xif0q/shirt/h/v/b/3xl-67iqtp-iqraar-original-imahmgpryhv3zppa.jpeg"
            }
        ];

        const grid = document.getElementById("productGrid");

        products.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = 
            `
                <img src="${p.image}" alt="${p.title}">
                <a href="${p.link}" target="_blank">${p.title}</a>
            `;

            grid.appendChild(card);
        });
    </script>

</body>

</html>
